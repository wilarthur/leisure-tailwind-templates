<!DOCTYPE html>
<html lang="en" class="overflow-x-hidden">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Components | Chelmsford City Sports</title>
    <link rel="stylesheet" href="/dist/output.css">
    <link rel="stylesheet" href="https://use.typekit.net/lxk3dcf.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@8/swiper-bundle.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css" />
</head>

<body>
    <section>
        <div class="w-full h-[75vh] bg-cover bg-center"
            style="background-image:url('https://www.biblecenterchurch.com/wp-content/uploads/2018/10/video-placeholder.png')"
            alt="">
            <div class="h-full flex flex-col justify-end">
                <div class="bg-gradient-to-b from-transparent to-black pb-10">
                    <div class="container mx-auto">
                        <h1 class="text-white lg:!text-6xl !text-4xl font-bold">FITNESS FOR <br> <span
                                class="text-sports-darker-yellow-100 lg:!text-8xl !text-6xl">EVERYONE</span></h1>
                        <div class="flex justify-between"><a
                                class="bg-white text-black font-bold px-6 py-2 mr-3 rounded-full flex items-center hover:bg-sports-darker-yellow-100 transition-all ease-in-out"
                                href="/">Become a member</a>
                            <a
                                class="bg-white text-black px-6 py-2 rounded-xl flex items-center hover:bg-sports-darker-yellow-100 cursor-pointer transition-all ease-in-out"><i
                                    class="bi bi-play-fill mr-3 text-xl"></i>Play
                                video</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
<script src="https://cdn.jsdelivr.net/npm/swiper@8/swiper-bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/mcstudios/glightbox/dist/js/glightbox.min.js"></script>
<script src="/dist/script.js"></script>




</html>
